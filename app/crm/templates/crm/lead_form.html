{% extends "crm/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block heading %}{{ title }}{% endblock %}
{% block content %}
<form method="post" class="panel">
  {% csrf_token %}
  <div class="form-grid">
    {% for field in form %}
      <div class="form-row {% if field.name == 'notes' %}full{% endif %}">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}<div class="muted">{{ field.help_text }}</div>{% endif %}
      </div>
    {% endfor %}
  </div>
  <div style="margin-top: 16px;">
    <button type="submit">保存线索</button>
    <a class="button secondary" href="{% url 'lead_list' %}">返回</a>
  </div>
</form>
{% endblock %}
