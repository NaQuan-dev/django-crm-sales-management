{% load static %}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录销售客户系统</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d7dee8;
      --primary: #176b87;
      --primary-dark: #0f4d61;
      --bad: #b42318;
      --nav: #17324d;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; background: var(--bg); color: var(--ink); }
    .wrap { min-height: 100vh; display: grid; grid-template-columns: 1fr 420px; }
    .hero {
      background: var(--nav);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-logo-box {
      width: 114px;
      height: 64px;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 14px 32px rgba(0, 0, 0, .2);
    }
    .brand-logo-text { display: flex; width: 100%; height: 100%; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; color: var(--primary); letter-spacing: 0; }
    .brand-title { font-size: 28px; font-weight: 700; line-height: 1.15; }
    .brand-subtitle { margin-top: 6px; color: #c8e2ff; }
    .login-side { display: grid; place-items: center; padding: 24px; }
    .panel { width: 100%; max-width: 360px; background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 24px; box-shadow: 0 18px 38px rgba(16, 24, 40, .08); }
    h1 { margin: 0 0 18px; font-size: 24px; }
    label { display: block; margin: 12px 0 6px; color: #344054; }
    input { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 10px; font: inherit; }
    button { margin-top: 18px; width: 100%; border: 0; border-radius: 6px; padding: 10px; background: var(--primary); color: #fff; font: inherit; cursor: pointer; }
    button:hover { background: var(--primary-dark); }
    .error { color: var(--bad); background: #fff1f0; border: 1px solid #fecdca; border-radius: 6px; padding: 9px 10px; }
    .muted { color: var(--muted); }
    @media (max-width: 820px) {
      .wrap { grid-template-columns: 1fr; }
      .hero { min-height: 180px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="brand">
        <div class="brand-logo-box"><span class="brand-logo-text">CRM</span></div>
        <div>
          <div class="brand-title">销售客户系统</div>
          <div class="brand-subtitle">客户管理系统</div>
        </div>
      </div>
    </section>
    <section class="login-side">
      <form class="panel" method="post">
        {% csrf_token %}
        <h1>登录</h1>
        <p class="muted">使用系统分配的销售或管理员账号登录。</p>
        {% if form.errors %}<p class="error">账号或密码不正确。</p>{% endif %}
        <label for="{{ form.username.id_for_label }}">账号</label>
        {{ form.username }}
        <label for="{{ form.password.id_for_label }}">密码</label>
        {{ form.password }}
        <button type="submit">登录</button>
      </form>
    </section>
  </div>
</body>
</html>
